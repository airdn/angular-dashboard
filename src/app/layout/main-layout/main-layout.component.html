<app-header (menuToggled)="onMenuToggle()"/>

<mat-sidenav-container class="sidenav-container">
    <mat-sidenav
        #sidenav
        class="sidenav"
        [mode]="isMobile() ? 'over' : 'side'"
        [opened]="!isMobile()"
    >
        <app-sidebar />
    </mat-sidenav>

    <mat-sidenav-content class="main-content">
        <div class="content-wrapper">
            <router-outlet />
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
