@if (isLoading()) {
    <app-loading-spinner message="Loading metrics..." />
} @else if (error()) {
    <app-error-message
        [title]="'Error loading metrics'"
        [message]="error()!"
        (retry)="loadMetrics()"
    />
} @else {
    <div class="metrics-grid">
        @for (metric of metricCards(); track metric.label) {
            <app-metric-card [metric]="metric" />
        }
    </div>
}
