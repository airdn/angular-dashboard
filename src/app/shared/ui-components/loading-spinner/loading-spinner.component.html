<div
    class="loading-container"
    [class.overlay]="overlay()"
    [class.fullscreen]="fullscreen()"
>
    <div class="loading-content">
        <mat-spinner [diameter]="diameter()" [color]="color()" />

        @if (message()) {
            <p class="loading-message">{{ message() }}</p>
        }
    </div>
</div>
